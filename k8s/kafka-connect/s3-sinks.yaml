apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: s3-sink-multi-topic
  labels:
    strimzi.io/cluster: kafka-connect-s3
spec:
  class: io.confluent.connect.s3.S3SinkConnector
  tasksMax: 2
  config:
    # Topics to consume (comma-separated)
    topics: "preproc.btc-usdt.level2.1min"

    # S3 base config
    s3.bucket.name: "trade-bots-farm"
    format.class: "io.confluent.connect.s3.format.json.JsonFormat"

    # Map topics to different S3 directories
    topics.dir: "data"  # Base dir (optional)
    topic.directory.format: "${topic}"  # Creates subdirs per topic

