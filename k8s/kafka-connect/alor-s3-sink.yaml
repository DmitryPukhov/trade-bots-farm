apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: alor-s3-sink
  labels:
    strimzi.io/cluster: kafka-connect-s3
spec:
  class: io.confluent.connect.s3.S3SinkConnector
  config:
    # Required configurations
    s3.bucket.name: trade-bots-farm
    topics: raw.alor.MOEX.TQBR.SBER.candles.1min
    format.class: io.confluent.connect.s3.format.json.JsonFormat
    storage.class: io.confluent.connect.s3.storage.S3Storage
    store.url: "http://minio:9000"

    # Path configuration
    topics.dir: data/raw/alor

    # path format pattern convention:
    # yyyy - year
    # 'year='yyyy - literal text 'year=' then year value
    # literals are in single quotes, values are not
    # The whole construction is a string value in double quotes
    path.format: "'year='yyyy'/month='MM'/day='dd"

    # Time-based partitioning (required for path formatting)
    partitioner.class: io.confluent.connect.storage.partitioner.TimeBasedPartitioner
    partition.duration.ms: 3600000  # 1 hour partition duration (must be positive)
    timestamp.extractor: Wallclock  # Use system time

    # File rotation
    rotate.interval.ms: 60000  # Rotate every minute
    flush.size: 100000  # Large number to prioritize time-based rotation

    # Timezone settings
    timezone: Europe/Moscow
    locale: en-US