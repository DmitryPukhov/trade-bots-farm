# ---- Auth configuration ----
# Uses existing secret `mlflow-tracking`
auth:
  enabled: true
  existingAdminSecret:
    name: mlflow-tracking
    usernameKey: admin-user
    passwordKey: admin-password

# ---- PostgreSQL backend store (bundled Bitnami sub-chart) ----
backendStore:
  databaseMigration: true
  databaseConnectionCheck: true

postgresql:
  enabled: true
  auth:
    database: bitnami_mlflow
    existingSecret: mlflow-postgresql
    secretKeys:
      userPasswordKey: password
      adminPasswordKey: postgres-password

# ---- S3 artifact storage (SeaweedFS S3-compatible) ----
artifactRoot:
  s3:
    enabled: true
    bucket: trade-bots-farm
    path: mlartifacts
    existingSecret:
      name: mlflow-s3
      keyOfAccessKeyId: access-key-id
      keyOfSecretAccessKey: access-key-secret

extraFlags:
  - serveArtifacts

extraEnvVars:
  MLFLOW_S3_ENDPOINT_URL: "http://seaweedfs-s3.tradebotsfarm.svc.cluster.local:8333"
  AWS_S3_IGNORE_TLS: "true"

# ---- Service ----
service:
  type: LoadBalancer
