apiServer:
  service:
    type: ClusterIP
    ports:
      - name: airflow-ui
        port: 8080
        targetPort: 8080

ingress:
  web:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - name: airflow.tradebotsfarm.svc.cluster.local
    path: "/"
    pathType: "ImplementationSpecific"

airflow:
  image:
    repository: apache/airflow  # Official image
    tag: 3.2.1  # Replace with your desired Airflow 3.x version (e.g., 3.0.0 once released)
    pullPolicy: IfNotPresent

  # 2. Ensure correct executor setup
  executor: "CeleryExecutor"  # Required for webserver

  config:
    AIRFLOW__CORE__REMOTE_LOGGING: "True"
    AIRFLOW__CORE__REMOTE_BASE_LOG_FOLDER: "s3://trade-bots-farm/airflow/logs/"
    AIRFLOW__CORE__REMOTE_DAGS: "s3://trade-bots-farm/airflow/dags/"
    AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/dags"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql://postgres:postgres@airflow-postgresql:5432/airflow"

webserverSecretKeySecretName: "airflow"

volumes:
  - name: airflow-dags
    persistentVolumeClaim:
      claimName: airflow-dags
  - name: environment
    persistentVolumeClaim:
      claimName: environment
  - name: wheels
    persistentVolumeClaim:
      claimName: wheels

volumeMounts:
  - mountPath: /opt/airflow/dags
    name: airflow-dags

  - mountPath: /opt/trade-bots-farm/environment
    name: environment

  - mountPath: /opt/trade-bots-farm/wheels
    name: wheels

# Kubernetes executor secrets
kubernetes:
  envFromSecrets:
    - "airflow"

# PostgreSQL configuration
postgresql:
  image:
    repository: postgres
    tag: "11"
    pullPolicy: IfNotPresent
  postgresqlDatabase: "airflow"
  postgresqlUsername: "postgres"
  postgresqlPassword: "postgres"
