# Airflow version to deploy
airflowVersion: "3.2.1"

# Default Airflow tag to use
defaultAirflowTag: "3.2.1"

images:
  airflow:
    repository: apache/airflow
    tag: "3.2.1"
    pullPolicy: IfNotPresent

# Airflow executor
executor: "CeleryExecutor"

# Airflow configuration
config:
  core:
    load_examples: "False"
    remote_logging: "True"
    remote_base_log_folder: "s3://trade-bots-farm/airflow/logs/"
    remote_dags: "s3://trade-bots-farm/airflow/dags/"
    dags_folder: "/opt/airflow/dags"
    donot_log_cli: "True"

# Database connection - managed via chart's data section (creates secret automatically)
data:
  metadataConnection:
    user: postgres
    pass: postgres
    protocol: postgresql
    host: airflow-postgresql
    port: 5432
    db: airflow
    sslmode: disable

# Web UI Ingress
ingress:
  web:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - name: airflow.tradebotsfarm.svc.cluster.local
    path: "/"
    pathType: "ImplementationSpecific"

# API Server configuration
apiServer:
  service:
    type: ClusterIP
    ports:
      - name: airflow-ui
        port: 8080
        targetPort: 8080

# Run database migrations via a Kubernetes Job (post-install/upgrade hook)
migrateDatabaseJob:
  enabled: true

# Wait for the migration job to complete before starting main containers
# NOTE: Must be false on first install to avoid deadlock where init containers
# wait for a post-install hook job that hasn't run yet. Set to true after
# initial migrations are complete.
waitForMigrations:
  enabled: false

# Web server secret key from existing Kubernetes secret
webserverSecretKeySecretName: "airflow"

# Extra envFrom to inject secrets into all Airflow containers
extraEnvFrom: |
  - secretRef:
      name: airflow

# Additional volumes
volumes:
  - name: airflow-dags
    persistentVolumeClaim:
      claimName: airflow-dags
  - name: environment
    persistentVolumeClaim:
      claimName: environment
  - name: wheels
    persistentVolumeClaim:
      claimName: wheels

volumeMounts:
  - mountPath: /opt/airflow/dags
    name: airflow-dags
  - mountPath: /opt/trade-bots-farm/environment
    name: environment
  - mountPath: /opt/trade-bots-farm/wheels
    name: wheels

# PostgreSQL configuration
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "11"
    pullPolicy: IfNotPresent
  auth:
    enablePostgresUser: true
    postgresPassword: postgres
    username: postgres
    password: postgres
