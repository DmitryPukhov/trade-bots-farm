# ---- Auth configuration ----
# Uses existing secret `mlflow-tracking` created by the secrets module
auth:
  enabled: true
  existingAdminSecret:
    name: mlflow-tracking
    usernameKey: admin-user
    passwordKey: admin-password

# ---- PostgreSQL backend store (bundled Bitnami sub-chart) ----
# The chart includes a Bitnami PostgreSQL sub-chart for the backend store.
# Uses existing secret `mlflow-postgresql` created by the secrets module.
backendStore:
  databaseMigration: true
  databaseConnectionCheck: true

postgresql:
  enabled: true
  auth:
    database: bitnami_mlflow
    existingSecret: mlflow-postgresql
    secretKeys:
      userPasswordKey: password
      adminPasswordKey: postgres-password
  primary:
    persistence:
      # Use the pre-created PVC from the Terraform module (data-mlflow-postgresql-0)
      existingClaim: "data-mlflow-postgresql-0"

# ---- S3 artifact storage (SeaweedFS S3-compatible) ----
# Uses existing secret `mlflow-s3` created by the secrets module.
artifactRoot:
  s3:
    enabled: true
    bucket: trade-bots-farm
    path: mlartifacts
    existingSecret:
      name: mlflow-s3
      keyOfAccessKeyId: access-key-id
      keyOfSecretAccessKey: access-key-secret

extraFlags:
  # Enable serving of artifact uploads/downloads via MLflow proxy to S3
  - serveArtifacts

# S3-compatible endpoint configuration (SeaweedFS)
extraEnvVars:
  MLFLOW_S3_ENDPOINT_URL: "http://seaweedfs-s3.tradebotsfarm.svc.cluster.local:8333"
  AWS_S3_IGNORE_TLS: "true"

# ---- Service ----
service:
  type: ClusterIP

# ---- Ingress ----
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: "mlflow.tradebotsfarm.svc.cluster.local"
      paths:
        - path: "/"
          pathType: "Prefix"
  tls: []
