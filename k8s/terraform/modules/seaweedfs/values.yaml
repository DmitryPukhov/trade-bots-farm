# SeaweedFS Helm Chart Values

# Master Server Configuration
master:
  enabled: true
  replicas: 1
  port: 9333
  grpcPort: 19333
  
  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  # Persistence
  persistence:
    enabled: true
    storageClass: "standard"
    size: "2Gi"

# Volume Server Configuration
volume:
  enabled: true
  replicas: 1
  port: 8080
  grpcPort: 18080
  
  # Resource limits
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  
  # Persistence
  persistence:
    enabled: true
    storageClass: "standard"
    size: "10Gi"

# Filer Configuration
filer:
  enabled: true
  replicas: 1
  port: 8888
  grpcPort: 18888
  
  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# S3 API Configuration
s3:
  enabled: true
  replicas: 1
  port: 8333
  
  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Image Configuration
image:
  repository: "chrislusf/seaweedfs"
  tag: "latest"
  pullPolicy: "Always"

# Network Policy
networkPolicy:
  enabled: false

# TLS Configuration
tls:
  enabled: false

# Global Configuration
global:
  namespace: "default"
  storageClass: "standard"
