# SeaweedFS Helm Chart Values

# Master Server Configuration
master:
  enabled: true
  replicas: 1
  port: 9333
  grpcPort: 19333
  
  ingress:
    enabled: true
    className: "nginx"
    path: "/"
    pathType: "Prefix"

# Volume Server Configuration
volume:
  enabled: true
  replicas: 1
  port: 8080
  grpcPort: 18080
  
  ingress:
    enabled: true
    className: "nginx"

  
  # Persistence
  persistence:
    enabled: true
    storageClass: "standard"
    size: "10Gi"

# Filer Configuration
filer:
  enabled: true
  replicas: 1
  port: 8888
  grpcPort: 18888
  ingress:
    enabled: true
    className: "nginx"
    path: "/"
    pathType: "Prefix"
  # S3 API configuration
  s3:
    enabled: true
  

# S3 API Configuration
s3:
  enabled: true
  replicas: 1
  port: 8333
  enableAuth: true
  ingress:
    enabled: true
    className: "nginx"


# Image Configuration
image:
  repository: "chrislusf/seaweedfs"
  tag: "latest"
  pullPolicy: "Always"

# Network Policy
networkPolicy:
  enabled: false

# TLS Configuration
tls:
  enabled: false

# Global Configuration
global:
  namespace: "default"
  storageClass: "standard"
