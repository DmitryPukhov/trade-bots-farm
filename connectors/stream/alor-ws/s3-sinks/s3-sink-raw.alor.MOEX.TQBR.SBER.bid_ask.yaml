apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: s3-sink-raw-alor-moex-tqbr-sber-bid-ask
  namespace: trade-bots-farm
  labels:
    strimzi.io/cluster: kafka-connect-s3  # Must match your KafkaConnect name
spec:
  class: io.confluent.connect.s3.S3SinkConnector
  tasksMax: 1  # Match your topic's partition count
  config:
    topics.dir: "data/raw/alor/moex/tqbr"
    topics: "raw.alor.MOEX.TQBR.SBER.bid_ask"
    format.class: "io.confluent.connect.s3.format.json.JsonFormat"
    flush.size: "100"  # Messages per file
    rotate.interval.ms: "60000"  # 1-minute rotation
    # Inherits from KafkaConnect:
    # - s3.endpoint
    # - s3.path.style.access
    # - AWS_ACCESS_KEY_ID
    # - AWS_SECRET_ACCESS_KEY